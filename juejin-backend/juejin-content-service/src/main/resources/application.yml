server:
  port: 8082

spring:
  application:
    name: juejin-content-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: juejin-dev
      config:
        server-addr: localhost:8848
        namespace: juejin-dev
        file-extension: yml
        shared-configs:
          - data-id: juejin-common.yml
            group: DEFAULT_GROUP
            refresh: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/juejin?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  level:
    com.juejin.content: debug
